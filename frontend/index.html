<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Collection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-4">

<h1 class="fw-bold mb-4">
My Collection
</h1>

<div class="row mb-4">

<div class="col-md-8 mb-2">

<input
type="text"
id="searchInput"
class="form-control"
placeholder="Search items..."
onkeyup="searchItems()"
>

</div>

<div class="col-md-4">

<select
id="tagFilter"
class="form-select"
onchange="filterItems()"
>

<option value="All">
All Tags
</option>

<option value="Design">
Design
</option>

<option value="Development">
Development
</option>

<option value="Productivity">
Productivity
</option>

</select>

</div>

</div>

<div id="cardContainer"></div>

</div>

<button
class="btn btn-dark floating-btn"
onclick="openNewItemModal()"
>

<i class="bi bi-plus-lg"></i>

</button>

<div
class="modal fade"
id="itemModal"
tabindex="-1"
>

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Add Item
</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal"
></button>

</div>

<div class="modal-body">
<form class="needs-validation" id="itemForm" novalidate onsubmit="addItem(event)">

<input
 type="text"
 id="title"
 class="form-control mb-3"
 placeholder="Title *"
 required
>
<div class="invalid-feedback">Please provide a title.</div>

<textarea
 id="description"
 class="form-control mb-3"
 placeholder="Description *"
 required
></textarea>
<div class="invalid-feedback">
  Please provide a description.
</div>

<select
 id="tag"
 class="form-select mb-3"
 required
>

<option value="">
Select Tag *
</option>

<option value="Design">
Design
</option>

<option value="Development">
Development
</option>

<option value="Productivity">
Productivity
</option>

</select>
<div class="invalid-feedback">
  Please select a tag.
</div>

<input
 type="text"
 id="image_url"
 class="form-control mb-3"
 placeholder="Image URL (optional)"
>

<input
 type="text"
 id="link"
 class="form-control"
 placeholder="Visit URL (optional)"
>

</form>
</div>

<div class="modal-footer">

<button
 type="submit"
 class="btn btn-dark"
 form="itemForm"
>
Save Item
</button>

</div>

</div>

</div>

</div>

<div id="confirmOverlay">
  <div id="confirmBox">
    <svg class="tick-circle" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" id="confirmIcon">
      <circle class="tick-circle-bg" cx="40" cy="40" r="35"/>
      <circle class="tick-circle-ring" cx="40" cy="40" r="35" transform="rotate(-90 40 40)"/>
      <polyline class="tick-check" points="22,42 34,54 58,28"/>
    </svg>
    <p id="confirmMessage">Success</p>
    <button id="confirmOkBtn">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
